<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Hub | Community Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container{max-width:900px;margin:3rem auto;padding:0 2rem;}
        .chat-header{text-align:center;margin-bottom:2rem;}
        .chat-window{background:#111;height:400px;overflow-y:auto;padding:1rem;border-radius:8px;margin-bottom:1.5rem;}
        .chat-message{color:#eee;margin:10px 0;padding:6px;border-bottom:1px solid #333;}
        .chat-input-area{display:flex;gap:10px;}
        .chat-input{flex:1;padding:12px;border-radius:6px;border:none;font-size:1rem;}
    </style>
</head>
<body>
    <nav>
        <div class="logo">MC HUB</div>
        <div class="nav-links" id="navMenu">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
            <a href="chat.html">Community Chat</a>
            <a href="admin.html">User Login/register</a>
        </div>
        <div class="hamburger" id="hamburgerBtn">&#9776;</div>
    </nav>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Minecraft Community Chat</h1>
            <p>Talk with other Minecraft players, all messages saved permanently on your device</p>
        </div>
        <div class="chat-window" id="chatWindow"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Type your message here...">
            <button class="btn submit-btn" id="sendChat">Send</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Minecraft Hub | Minecraft belongs to Mojang Studios</p>
    </footer>
    <script>
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navMenu = document.getElementById('navMenu');
        hamburgerBtn.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => navMenu.classList.remove('active'));
        });
        function getChatData(){
            return JSON.parse(localStorage.getItem("mcChat")) || [];
        }
        function saveChatData(arr){
            localStorage.setItem("mcChat", JSON.stringify(arr));
        }
        function renderChat(){
            const windowEl = document.getElementById("chatWindow");
            const chatList = getChatData();
            let html = "";
            chatList.forEach(item => {
                html += `<div class="chat-message">[${item.time}] ${item.user}: ${item.text}</div>`;
            });
            windowEl.innerHTML = html;
            windowEl.scrollTop = windowEl.scrollHeight;
        }
        renderChat();
        const sendBtn = document.getElementById("sendChat");
        const input = document.getElementById("chatInput");
        sendBtn.addEventListener('click', () => {
            const text = input.value.trim();
            if(text === "") return;
            const currentUser = localStorage.getItem("currentUser") || "Guest Player";
            const chatArr = getChatData();
            chatArr.push({
                time: new Date().toLocaleString(),
                user: currentUser,
                text: text
            });
            saveChatData(chatArr);
            input.value = "";
            renderChat();
        });
        input.addEventListener('keydown', (e) => {
            if(e.key === "Enter") sendBtn.click();
        });
    </script>
</body>
</html>
